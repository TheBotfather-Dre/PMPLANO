<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inventory">
<title>Inventory</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;--surface:#161616;--surface2:#212121;--border:#2a2a2a;
  --text:#f0f0f0;--muted:#777;--accent:#4ade80;--warn:#fb923c;
  --danger:#f87171;--info:#60a5fa;--radius:12px;
  --safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;font-size:15px;min-height:100dvh;overflow-x:hidden;}
input,button,textarea{font-family:inherit;}
.screen{display:none;flex-direction:column;min-height:100dvh;}
.screen.active{display:flex;}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 14px) 16px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hdr h1{font-size:17px;font-weight:600;}
.hdr-sub{font-size:12px;color:var(--muted);}
.icon-btn{background:none;border:none;color:var(--info);font-size:14px;font-weight:500;cursor:pointer;padding:4px 0;}
.home-body{flex:1;padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;padding-bottom:calc(var(--safe-bottom)+20px);}
.order-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.order-card:active{background:var(--surface2);}
.oc-ord{font-size:15px;font-weight:600;}
.oc-meta{font-size:12px;color:var(--muted);margin-top:3px;}
.oc-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
.oc-progress{font-size:12px;color:var(--accent);font-weight:600;}
.badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;}
.b-ok{background:#052e16;color:#4ade80;}
.b-miss{background:#2d0a0a;color:#f87171;}
.b-short{background:#2d1a00;color:#fb923c;}
.b-extra{background:#2d1a00;color:#fb923c;}
.big-btn{background:var(--accent);color:#000;border:none;border-radius:var(--radius);padding:15px;font-size:15px;font-weight:700;cursor:pointer;width:100%;}
.ghost-btn{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:13px;font-size:14px;font-weight:500;cursor:pointer;width:100%;}
.danger-btn{background:none;color:var(--danger);border:1px solid #3a1a1a;border-radius:var(--radius);padding:13px;font-size:14px;cursor:pointer;width:100%;}
.section-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.form-body{flex:1;padding:16px;overflow-y:auto;padding-bottom:calc(var(--safe-bottom)+80px);}
.field{margin-bottom:14px;}
.field label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px;font-weight:500;}
.field input,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 12px;color:var(--text);font-size:14px;outline:none;}
.field input:focus,.field textarea:focus{border-color:#555;}
.field textarea{resize:none;height:120px;font-family:ui-monospace,monospace;font-size:12px;line-height:1.6;}
.paste-hint{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5;}
.bottom-bar{background:var(--surface);border-top:1px solid var(--border);padding:12px 16px calc(var(--safe-bottom)+12px);}
.bottom-bar button{width:100%;}

/* STATS - 5 columns now */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 12px;background:var(--bg);border-bottom:1px solid var(--border);}
.stat{background:var(--surface);border-radius:8px;padding:8px 4px;text-align:center;}
.stat-n{font-size:17px;font-weight:700;line-height:1;}
.stat-l{font-size:9px;color:var(--muted);margin-top:2px;}
.n-ok{color:#4ade80;}.n-miss{color:#f87171;}.n-short{color:#fb923c;}.n-extra{color:#a78bfa;}.n-info{color:#60a5fa;}

nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
nav button{flex:1;padding:11px 0;font-size:13px;font-weight:500;background:none;border:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
nav button.active{color:var(--text);border-bottom-color:var(--accent);}
.pane{display:none;flex:1;overflow-y:auto;padding-bottom:80px;}
.pane.active{display:block;}
.filter-row{display:flex;gap:8px;padding:10px 12px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);}
.filter-row::-webkit-scrollbar{display:none;}
.chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:12px;color:var(--muted);cursor:pointer;white-space:nowrap;}
.chip.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}
.chip.chip-short.active{background:#fb923c;border-color:#fb923c;}
.chip.chip-extra.active{background:#a78bfa;border-color:#a78bfa;}
.chip.chip-miss.active{background:#f87171;border-color:#f87171;color:#000;}

.list-item{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.li-left{flex:1;min-width:0;}
.li-sku{font-size:13px;font-weight:600;font-family:ui-monospace,monospace;}
.li-cs{font-size:12px;color:var(--muted);}
.li-xref{font-size:11px;color:var(--muted);margin-top:1px;}
.li-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;margin-left:10px;}
.li-qty{font-size:11px;color:var(--muted);}

.entry-area{padding:12px 14px;background:var(--surface);border-bottom:1px solid var(--border);}
.entry-row{display:flex;gap:8px;margin-bottom:8px;}
.entry-row:last-child{margin-bottom:0;}
.ei{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 10px;color:var(--text);font-size:14px;outline:none;min-width:0;}
.ei:focus{border-color:#555;}
.ei::placeholder{color:var(--muted);}
.ei-sm{width:58px!important;flex:none!important;}
.add-btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:10px 14px;font-size:14px;font-weight:700;cursor:pointer;}
.scan-btn{background:var(--info);color:#000;border:none;border-radius:8px;padding:10px 12px;font-size:14px;font-weight:700;cursor:pointer;}
.cnt-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);}
.cnt-left{flex:1;}
.cnt-sku{font-size:13px;font-weight:600;font-family:ui-monospace,monospace;}
.cnt-cs{font-size:12px;color:var(--muted);margin-top:2px;}
.cnt-right{display:flex;align-items:center;gap:8px;}
.del-btn{background:none;border:none;color:var(--danger);font-size:20px;cursor:pointer;padding:4px 8px;line-height:1;}
.empty{text-align:center;padding:40px 16px;color:var(--muted);font-size:14px;}

#scanner-overlay{display:none;position:fixed;inset:0;background:#000;z-index:999;flex-direction:column;}
#scanner-overlay.open{display:flex;}
#scanner-wrap{flex:1;position:relative;overflow:hidden;}
#scanner-wrap video,#scanner-wrap canvas{width:100%;height:100%;object-fit:cover;}
.scan-aim{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);width:260px;height:110px;border:2px solid var(--accent);border-radius:8px;pointer-events:none;}
.scan-status{padding:14px;background:#000;text-align:center;font-size:14px;color:var(--muted);}
.scan-close{padding:12px 16px calc(var(--safe-bottom)+12px);background:#111;border-top:1px solid #222;}
.scan-close button{width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:13px;font-size:15px;font-weight:600;cursor:pointer;}
#scan-feedback{position:absolute;inset:0;background:rgba(74,222,128,0.2);display:none;pointer-events:none;}
.toast{position:fixed;bottom:calc(var(--safe-bottom)+90px);left:50%;transform:translateX(-50%);background:#222;border:1px solid #333;border-radius:var(--radius);padding:10px 18px;font-size:13px;color:var(--text);z-index:9999;display:none;white-space:nowrap;}
.toast.show{display:block;}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="scanner-overlay">
  <div id="scanner-wrap">
    <div id="scan-feedback"></div>
    <div class="scan-aim"></div>
  </div>
  <div class="scan-status" id="scan-status">Point camera at barcode</div>
  <div class="scan-close"><button onclick="closeScanner()">Cancel</button></div>
</div>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="hdr">
    <h1>Inventory</h1>
    <button class="icon-btn" onclick="showScreen('screen-new')">+ New Order</button>
  </div>
  <div class="home-body">
    <div class="section-label">Orders</div>
    <div id="order-list"><div class="empty">No orders yet.</div></div>
    <button class="ghost-btn" onclick="showScreen('screen-new')">+ New Order</button>
    <button class="danger-btn" id="clear-all-btn" style="display:none;" onclick="clearAllOrders()">Clear All Orders</button>
  </div>
</div>

<!-- NEW ORDER -->
<div class="screen" id="screen-new">
  <div class="hdr">
    <button class="icon-btn" onclick="showScreen('screen-home')">&#8592; Back</button>
    <h1>New Order</h1>
    <div style="width:50px;"></div>
  </div>
  <div class="form-body">
    <div class="field"><label>Order Number</label><input id="new-ord" placeholder="e.g. 9788454" autocomplete="off"/></div>
    <div class="field"><label>Customer PO</label><input id="new-po" placeholder="e.g. 161768" autocomplete="off"/></div>
    <div class="field">
      <label>Paste packing list — one item per line</label>
      <textarea id="new-paste" placeholder="SKU COLOR/SIZE XREF QTY&#10;&#10;Example:&#10;MS26EK03S PPLISL HALES PERFORM 3&#10;MS26EK21S WHT L CLARK PERFORM 1&#10;MS26EK23S WH/BDXL PHOENIX PERFO 1"></textarea>
      <div class="paste-hint">Format: SKU &nbsp;COLOR/SIZE &nbsp;XREF (any words) &nbsp;QTY (last number).<br>Color/Size and Xref are optional but help with matching.</div>
    </div>
    <div id="new-preview"></div>
  </div>
  <div class="bottom-bar"><button class="big-btn" onclick="createOrder()">Create Order</button></div>
</div>

<!-- DETAIL -->
<div class="screen" id="screen-detail">
  <div class="hdr">
    <button class="icon-btn" onclick="showScreen('screen-home')">&#8592; Back</button>
    <div style="text-align:center;">
      <div style="font-size:16px;font-weight:600;" id="det-title">Order</div>
      <div class="hdr-sub" id="det-sub"></div>
    </div>
    <button class="icon-btn" onclick="exportXLSX()">Export</button>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-n n-info" id="s-total">0</div><div class="stat-l">expected</div></div>
    <div class="stat"><div class="stat-n n-ok" id="s-ok">0</div><div class="stat-l">OK</div></div>
    <div class="stat"><div class="stat-n n-miss" id="s-miss">0</div><div class="stat-l">missing</div></div>
    <div class="stat"><div class="stat-n n-extra" id="s-extra">0</div><div class="stat-l">extra</div></div>
  </div>
  <nav>
    <button class="active" onclick="showTab('pack')">Packing List</button>
    <button onclick="showTab('count')">Counted</button>
  </nav>
  <div class="pane active" id="pane-pack">
    <div class="filter-row">
      <div class="chip active" onclick="setFilter('all',this)">All</div>
      <div class="chip chip-ok" onclick="setFilter('ok',this)">OK</div>
      <div class="chip chip-miss" onclick="setFilter('missing',this)">Missing</div>
      <div class="chip chip-extra" onclick="setFilter('extra',this)">Extra</div>
    </div>
    <div id="pl-list"></div>
  </div>
  <div class="pane" id="pane-count">
    <div class="entry-area">
      <div class="entry-row">
        <input class="ei" id="i-sku" placeholder="SKU" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"/>
        <input class="ei" id="i-cs" placeholder="Color/Size" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"/>
        <input class="ei ei-sm" id="i-qty" type="number" min="1" value="1"/>
      </div>
      <div class="entry-row">
        <button class="scan-btn" onclick="openScanner()">&#9641; Scan</button>
        <button class="add-btn" style="flex:1;" onclick="addCounted()">+ Add</button>
        <button style="background:none;color:var(--danger);border:1px solid #3a1a1a;border-radius:8px;padding:10px 12px;font-size:13px;cursor:pointer;" onclick="clearCounted()">Clear</button>
      </div>
    </div>
    <div id="cnt-list"></div>
  </div>
  <div class="bottom-bar"><button class="big-btn" onclick="exportXLSX()">&#8659; Export Reconciliation</button></div>
</div>

<script>
const DB='inv_app_v2';
const SEED_ID='ord_9788454';
const SEED={
  id:SEED_ID,ordNum:'9788454',po:'161768',counted:[],
  items:[
    {ln:1,loc:'C02-002C01',sku:'MS26EK03S',cs:'PPLISL',xref:'HALES PERFORM',qty:3},
    {ln:2,loc:'A14-044A01',sku:'MS26EK03S',cs:'PPLISM',xref:'HALES PERFORM',qty:1},
    {ln:3,loc:'C02-002B01',sku:'MS26EK21S',cs:'WHT L',xref:'CLARK PERFORM',qty:1},
    {ln:4,loc:'A14-020B02',sku:'MS26EK21S',cs:'WHT M',xref:'CLARK PERFORM',qty:1},
    {ln:5,loc:'A16-038C01',sku:'MS26EK21S',cs:'WHT S',xref:'CLARK PERFORM',qty:1},
    {ln:6,loc:'C01-029B05',sku:'MS26EK21S',cs:'WINB L',xref:'CLARK PERFORM',qty:3},
    {ln:7,loc:'A11-059A03',sku:'MS26EK23S',cs:'W/GG XXL',xref:'PHOENIX PERFO',qty:1},
    {ln:8,loc:'A08-046A02',sku:'MS26EK23S',cs:'WH/BDXL',xref:'PHOENIX PERFO',qty:1},
    {ln:9,loc:'A11-013C03',sku:'MS26EK23S',cs:'WH/BDXXL',xref:'PHOENIX PERFO',qty:1},
    {ln:10,loc:'C02-006A05',sku:'MS26EK45',cs:'BRI XL',xref:'PINE PERFORMA',qty:1},
    {ln:11,loc:'C04-030A06',sku:'MS26EK45',cs:'WINB XL',xref:'PINE PERFORMA',qty:1},
    {ln:12,loc:'A08-054A02',sku:'MS26XK01E',cs:'IRSMTL',xref:'BALLAD PERFOR',qty:1},
    {ln:13,loc:'A08-063C05',sku:'MS26XK01E',cs:'IRSMTM',xref:'BALLAD PERFOR',qty:2},
    {ln:14,loc:'A12-006C04',sku:'MS26XK03E',cs:'SDUNEL',xref:'TREBLE PERFOR',qty:1},
    {ln:15,loc:'A11-011B06',sku:'MS26XK03E',cs:'WHT XL',xref:'TREBLE PERFOR',qty:1},
    {ln:16,loc:'C01-031B02',sku:'MS26XK13E',cs:'NAV M',xref:'EMPIRE PERFOR',qty:2},
    {ln:17,loc:'A11-051A04',sku:'MS26XK13E',cs:'NAV XL',xref:'EMPIRE PERFOR',qty:1},
    {ln:18,loc:'A09-054A03',sku:'MS26XK13E',cs:'STORML',xref:'EMPIRE PERFOR',qty:2},
    {ln:19,loc:'A08-062A05',sku:'MS26XK13E',cs:'STORMM',xref:'EMPIRE PERFOR',qty:1},
    {ln:20,loc:'A13-010C06',sku:'MS26XK13E',cs:'STORMXL',xref:'EMPIRE PERFOR',qty:1},
    {ln:21,loc:'A11-005C05',sku:'MS26XK13E',cs:'WHT XL',xref:'EMPIRE PERFOR',qty:1},
    {ln:22,loc:'C03-028B03',sku:'MS26XK50E',cs:'IRSMTL',xref:'SOUL PERFORMA',qty:1},
    {ln:23,loc:'C02-010C05',sku:'MS26XK50E',cs:'IRSMTM',xref:'SOUL PERFORMA',qty:2},
    {ln:24,loc:'A08-046B01',sku:'MS26XK50E',cs:'LGWILL',xref:'SOUL PERFORMA',qty:1},
    {ln:25,loc:'A11-026B06',sku:'MS26XK50E',cs:'LGWILM',xref:'SOUL PERFORMA',qty:1},
    {ln:26,loc:'A14-052A05',sku:'MS26XK50E',cs:'LGWILS',xref:'SOUL PERFORMA',qty:1},
    {ln:27,loc:'C02-014B02',sku:'MS26XK50E',cs:'LOGSBL',xref:'SOUL PERFORMA',qty:1},
    {ln:28,loc:'A14-039C03',sku:'MS26XK50E',cs:'LOGSBS',xref:'SOUL PERFORMA',qty:1},
    {ln:29,loc:'A15-055C06',sku:'MS26XK55E',cs:'LGWILXXL',xref:'ALBATROSS COT',qty:1},
    {ln:30,loc:'A15-010C04',sku:'MS26XK55E',cs:'SDUNEXL',xref:'ALBATROSS COT',qty:1},
    {ln:31,loc:'C02-032C01',sku:'MS26XK55E',cs:'WHT L',xref:'ALBATROSS COT',qty:2},
    {ln:32,loc:'A14-001C06',sku:'MS26XK60',cs:'LOGSBM',xref:'STEALTH PERFO',qty:2},
    {ln:33,loc:'B18-025G03',sku:'MS26XK60',cs:'STORMS',xref:'STEALTH PERFO',qty:1},
    {ln:34,loc:'C01-011A02',sku:'MS26XK60',cs:'STORMXL',xref:'STEALTH PERFO',qty:1},
    {ln:35,loc:'C01-019A03',sku:'MS26XK63',cs:'DSK M',xref:'ALBATROSS COT',qty:1},
  ]
};

let state={orders:{}};
let currentOrder=null;
let activeFilter='all';
let scannerRunning=false;
let scanCooldown=false;

function norm(s){ return String(s||'').toUpperCase().replace(/[^A-Z0-9\/]/g,' ').replace(/\s+/g,' ').trim(); }
function key(sku,cs){ return norm(sku)+'|'+norm(cs); }

function findMasterMatch(o, sku, cs){
  const k=key(sku,cs);
  const direct=o.items.find(r=>key(r.sku,r.cs)===k);
  if(direct) return direct;
  if(norm(cs)==='') return o.items.find(r=>norm(r.sku)===norm(sku));
  return null;
}

function loadState(){
  try{ const d=localStorage.getItem(DB); if(d) state=JSON.parse(d); }catch(e){}
  if(!state.orders[SEED_ID]){ state.orders[SEED_ID]=JSON.parse(JSON.stringify(SEED)); saveState(); }
}
function saveState(){ try{ localStorage.setItem(DB,JSON.stringify(state)); }catch(e){} }

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='screen-home') renderHome();
  if(id==='screen-detail') renderDetail();
  window.scrollTo(0,0);
}

function showToast(msg,dur=2200){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

function getCounts(o){ const m={}; (o.counted||[]).forEach(r=>{const k=key(r.sku,r.cs);m[k]=(m[k]||0)+r.qty;}); return m; }
function getMasterCounts(o){ const m={}; (o.items||[]).forEach(r=>{const k=key(r.sku,r.cs);m[k]=(m[k]||0)+r.qty;}); return m; }

function itemStatus(r,cmap){
  const have=cmap[key(r.sku,r.cs)]||0;
  if(have===0) return 'missing';
  if(have>=r.qty) return 'ok';
  return 'short';
}

function calcStats(o){
  const cmap=getCounts(o);
  const mmap=getMasterCounts(o);
  let totalExp=o.items.reduce((s,r)=>s+r.qty,0);
  let ok=0,missing=0,extra=0;
  o.items.forEach(r=>{
    const have=cmap[key(r.sku,r.cs)]||0;
    const st=itemStatus(r,cmap);
    if(st==='ok') ok+=r.qty;
    else if(st==='missing') missing+=r.qty;
    else if(st==='short'){ ok+=have; missing+=(r.qty-have); }
  });
  o.counted.forEach(r=>{ if(!mmap[key(r.sku,r.cs)]) extra+=r.qty; });
  return {totalExp,ok,missing,extra};
}

/* HOME */
function renderHome(){
  const list=document.getElementById('order-list');
  const ids=Object.keys(state.orders);
  document.getElementById('clear-all-btn').style.display=ids.length>0?'block':'none';
  if(!ids.length){list.innerHTML='<div class="empty">No orders yet.</div>';return;}
  list.innerHTML=ids.map(id=>{
    const o=state.orders[id];
    const {totalExp,ok,missing,extra}=calcStats(o);
    const allOk=missing===0&&extra===0&&ok>=totalExp;
    const bc=allOk?'b-ok':missing>0?'b-miss':'b-short';
    const bt=allOk?'Complete':missing>0?`${missing} missing`:'In progress';
    let counted=0; o.counted.forEach(r=>counted+=r.qty);
    return `<div class="order-card" onclick="openOrder('${id}')">
      <div>
        <div class="oc-ord">Order ${o.ordNum}</div>
        <div class="oc-meta">PO ${o.po} &middot; ${o.items.length} lines &middot; ${totalExp} pcs</div>
      </div>
      <div class="oc-right">
        <span class="badge ${bc}">${bt}</span>
        <span class="oc-progress">${counted}/${totalExp} counted</span>
      </div>
    </div>`;
  }).join('');
}

function clearAllOrders(){
  if(confirm('Delete ALL orders and counted data?')){ state={orders:{}}; saveState(); renderHome(); }
}

/* NEW ORDER */
function parsePaste(text){
  return text.split('\n').map(l=>l.trim()).filter(Boolean).map((line,i)=>{
    const parts=line.split(/\s+/);
    if(parts.length<1) return null;
    const last=parts[parts.length-1];
    const qty=parseInt(last);
    const hasQty=!isNaN(qty)&&qty>0&&parts.length>1;
    const sku=norm(parts[0]);
    let cs='',xref='',q=1;
    if(hasQty){
      q=qty;
      cs=parts.length>=3?norm(parts[1]):'';
      xref=parts.length>=4?parts.slice(2,parts.length-1).join(' ').toUpperCase():'';
    } else {
      cs=parts.length>=2?norm(parts[1]):'';
      xref=parts.length>=3?parts.slice(2).join(' ').toUpperCase():'';
    }
    return {ln:i+1,loc:'',sku,cs,xref,qty:q};
  }).filter(Boolean);
}

document.getElementById('new-paste').addEventListener('input',function(){
  const items=parsePaste(this.value);
  const p=document.getElementById('new-preview');
  if(!items.length){p.innerHTML='';return;}
  const total=items.reduce((s,r)=>s+r.qty,0);
  p.innerHTML=`<div style="font-size:12px;color:var(--accent);margin-top:4px;">&#10003; ${items.length} lines &middot; ${total} total pieces</div>`;
});

function createOrder(){
  const ordNum=document.getElementById('new-ord').value.trim()||'Unknown';
  const po=document.getElementById('new-po').value.trim()||'—';
  const items=parsePaste(document.getElementById('new-paste').value);
  if(!items.length){showToast('Add at least one item');return;}
  const id='ord_'+Date.now();
  state.orders[id]={id,ordNum,po,items,counted:[]};
  saveState();
  ['new-ord','new-po','new-paste'].forEach(x=>document.getElementById(x).value='');
  document.getElementById('new-preview').innerHTML='';
  openOrder(id);
}

/* DETAIL */
function openOrder(id){
  currentOrder=id;
  const o=state.orders[id];
  document.getElementById('det-title').textContent='Order '+o.ordNum;
  document.getElementById('det-sub').textContent='PO '+o.po;
  activeFilter='all';
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.chip')[0].classList.add('active');
  showScreen('screen-detail');
  showTab('pack');
}

function showTab(tab){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+tab).classList.add('active');
  document.querySelectorAll('nav button')[tab==='pack'?0:1].classList.add('active');
}

function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderPackList();
}

function renderPackList(){
  if(!currentOrder) return;
  const o=state.orders[currentOrder];
  const cmap=getCounts(o);
  const list=document.getElementById('pl-list');

  // for "extra" filter show counted items not in master
  if(activeFilter==='extra'){
    const mmap=getMasterCounts(o);
    const extras=o.counted.filter(r=>!mmap[key(r.sku,r.cs)]);
    if(!extras.length){list.innerHTML='<div class="empty">No extra items</div>';return;}
    list.innerHTML=extras.map(r=>`<div class="list-item">
      <div class="li-left"><div class="li-sku">${r.sku}</div><div class="li-cs">${r.cs}</div></div>
      <div class="li-right"><span class="badge b-extra">EXTRA</span><span class="li-qty">counted ${r.qty}</span></div>
    </div>`).join('');
    return;
  }

  const filtered=o.items.filter(r=>activeFilter==='all'||itemStatus(r,cmap)===activeFilter);
  if(!filtered.length){list.innerHTML='<div class="empty">No items</div>';return;}
  list.innerHTML=filtered.map(r=>{
    const have=cmap[key(r.sku,r.cs)]||0;
    const st=itemStatus(r,cmap);
    const bc=st==='ok'?'b-ok':st==='missing'?'b-miss':'b-short';
    const bt=st==='ok'?'OK':st==='missing'?'MISSING':`SHORT ${have}/${r.qty}`;
    return `<div class="list-item">
      <div class="li-left">
        <div class="li-sku">${r.sku}</div>
        <div class="li-cs">${r.cs}</div>
        ${r.xref?`<div class="li-xref">${r.xref}${r.ln?' · Ln'+r.ln:''}</div>`:''}
      </div>
      <div class="li-right">
        <span class="badge ${bc}">${bt}</span>
        <span class="li-qty">need ${r.qty}</span>
      </div>
    </div>`;
  }).join('');
}

function renderCounted(){
  if(!currentOrder) return;
  const o=state.orders[currentOrder];
  const mmap=getMasterCounts(o);
  const list=document.getElementById('cnt-list');
  if(!o.counted.length){list.innerHTML='<div class="empty">Nothing counted yet</div>';return;}
  list.innerHTML=o.counted.map((r,i)=>{
    const inM=!!mmap[key(r.sku,r.cs)];
    return `<div class="cnt-item">
      <div class="cnt-left">
        <div class="cnt-sku">${r.sku}</div>
        <div class="cnt-cs">${r.cs||'—'} · qty: ${r.qty}</div>
      </div>
      <div class="cnt-right">
        <span class="badge ${inM?'b-ok':'b-extra'}">${inM?'OK':'EXTRA'}</span>
        <button class="del-btn" onclick="removeCounted(${i})">&#x2715;</button>
      </div>
    </div>`;
  }).join('');
}

function updateStats(){
  if(!currentOrder) return;
  const o=state.orders[currentOrder];
  const {totalExp,ok,missing,extra}=calcStats(o);
  document.getElementById('s-total').textContent=totalExp;
  document.getElementById('s-ok').textContent=ok;
  document.getElementById('s-miss').textContent=missing;
  document.getElementById('s-extra').textContent=extra;
}

function renderDetail(){ renderPackList(); renderCounted(); updateStats(); }

function addCounted(skuOverride){
  if(!currentOrder) return;
  const sku=norm(skuOverride||document.getElementById('i-sku').value);
  const cs=norm(document.getElementById('i-cs').value);
  const qty=parseInt(document.getElementById('i-qty').value)||1;
  if(!sku) return;
  const o=state.orders[currentOrder];
  const match=findMasterMatch(o,sku,cs);
  const storeKey=match?key(match.sku,match.cs):key(sku,cs);
  const storeSku=match?match.sku:sku;
  const storeCs=match?match.cs:cs;
  const ex=o.counted.find(r=>key(r.sku,r.cs)===storeKey);
  if(ex){ex.qty+=qty;}else{o.counted.push({sku:storeSku,cs:storeCs,qty});}
  saveState(); renderDetail();
  if(!skuOverride){
    document.getElementById('i-sku').value='';
    document.getElementById('i-cs').value='';
    document.getElementById('i-qty').value='1';
    document.getElementById('i-sku').focus();
  }
  showToast(match?'Matched: '+storeSku+' '+storeCs:'Added as EXTRA: '+sku);
}

function removeCounted(i){
  state.orders[currentOrder].counted.splice(i,1);
  saveState(); renderDetail();
}

function clearCounted(){
  if(confirm('Clear all counted items?')){
    state.orders[currentOrder].counted=[];
    saveState(); renderDetail();
  }
}

/* SCANNER */
function openScanner(){
  document.getElementById('scanner-overlay').classList.add('open');
  document.getElementById('scan-status').textContent='Starting camera...';
  scannerRunning=true; scanCooldown=false;
  Quagga.init({
    inputStream:{type:'LiveStream',target:document.getElementById('scanner-wrap'),constraints:{facingMode:'environment',width:{min:640},height:{min:480}}},
    locator:{patchSize:'medium',halfSample:true},
    numOfWorkers:2,
    decoder:{readers:['code_128_reader','ean_reader','code_39_reader','upc_reader']},
    locate:true
  },function(err){
    if(err){document.getElementById('scan-status').textContent='Camera error — type manually';return;}
    Quagga.start();
    document.getElementById('scan-status').textContent='Point camera at barcode';
  });
  Quagga.onDetected(function(result){
    if(!scanCooldown&&result.codeResult&&result.codeResult.code){
      scanCooldown=true;
      const code=result.codeResult.code;
      document.getElementById('scan-feedback').style.display='block';
      setTimeout(()=>document.getElementById('scan-feedback').style.display='none',300);
      document.getElementById('i-sku').value=code;
      document.getElementById('i-cs').value='';
      document.getElementById('i-qty').value='1';
      closeScanner();
      showTab('count');
      showToast('Scanned: '+code);
      setTimeout(()=>document.getElementById('i-cs').focus(),400);
      setTimeout(()=>scanCooldown=false,2000);
    }
  });
}

function closeScanner(){
  if(scannerRunning){try{Quagga.stop();}catch(e){} scannerRunning=false;}
  document.getElementById('scanner-overlay').classList.remove('open');
}

/* EXPORT */
function exportXLSX(){
  if(!currentOrder) return;
  const o=state.orders[currentOrder];
  const cmap=getCounts(o); const mmap=getMasterCounts(o); const rows=[];
  o.items.forEach(r=>{
    const have=cmap[key(r.sku,r.cs)]||0;
    const st=have>=r.qty?'OK':have===0?'MISSING':`SHORT (${have}/${r.qty})`;
    rows.push({Ln:r.ln,Location:r.loc,SKU:r.sku,'Color/Size':r.cs,Xref:r.xref,'Expected':r.qty,'Counted':have,Status:st});
  });
  o.counted.filter(r=>!mmap[key(r.sku,r.cs)]).forEach(r=>{
    rows.push({Ln:'',Location:'',SKU:r.sku,'Color/Size':r.cs,Xref:'','Expected':0,'Counted':r.qty,Status:'EXTRA'});
  });
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[5,12,13,12,14,9,9,14].map(w=>({wch:w}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Inventory');
  XLSX.writeFile(wb,'inventory_'+o.ordNum+'.xlsx');
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&['i-sku','i-cs','i-qty'].includes(document.activeElement?.id)) addCounted();
});

loadState();
renderHome();
</script>
