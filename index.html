<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inventory">
<title>Inventory Checker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;
  --surface:#161616;
  --surface2:#212121;
  --border:#2a2a2a;
  --text:#f0f0f0;
  --muted:#888;
  --accent:#4ade80;
  --warn:#fb923c;
  --danger:#f87171;
  --info:#60a5fa;
  --radius:12px;
  --safe-top:env(safe-area-inset-top);
  --safe-bottom:env(safe-area-inset-bottom);
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;font-size:15px;min-height:100dvh;}

#app{display:flex;flex-direction:column;min-height:100dvh;}

header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:calc(var(--safe-top) + 14px) 16px 14px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
header h1{font-size:18px;font-weight:600;letter-spacing:-0.3px;}
header span{font-size:12px;color:var(--muted);}

.stats{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  padding:12px 16px;background:var(--bg);
  position:sticky;top:calc(var(--safe-top) + 53px);z-index:99;
  border-bottom:1px solid var(--border);
}
.stat{background:var(--surface);border-radius:var(--radius);padding:10px 8px;text-align:center;}
.stat-n{font-size:20px;font-weight:700;line-height:1;}
.stat-l{font-size:10px;color:var(--muted);margin-top:3px;}
.n-ok{color:var(--accent);}
.n-miss{color:var(--danger);}
.n-extra{color:var(--warn);}
.n-info{color:var(--info);}

nav{
  display:flex;background:var(--surface);
  border-bottom:1px solid var(--border);
}
nav button{
  flex:1;padding:12px 0;font-size:13px;font-weight:500;
  background:none;border:none;color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color 0.15s,border-color 0.15s;
}
nav button.active{color:var(--text);border-bottom-color:var(--accent);}

.pane{display:none;flex:1;overflow-y:auto;}
.pane.active{display:block;}

.entry-area{
  padding:12px 16px;background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky;top:calc(var(--safe-top) + 53px + 72px + 41px);z-index:98;
}
.entry-row{display:flex;gap:8px;margin-bottom:8px;}
.entry-row input{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;
  outline:none;min-width:0;
}
.entry-row input:focus{border-color:#444;}
.entry-row input::placeholder{color:var(--muted);}
.qty-input{width:64px!important;flex:none!important;}
.btn{
  background:var(--accent);color:#000;border:none;border-radius:8px;
  padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;
  white-space:nowrap;
}
.btn-ghost{
  background:var(--surface2);color:var(--muted);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;
}
.btn-danger{background:none;color:var(--danger);border:1px solid #3a1a1a;border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;}

.list-wrap{padding:0 0 120px;}

.list-item{
  display:grid;align-items:center;
  padding:12px 16px;border-bottom:1px solid var(--border);
  gap:4px;
}
.item-top{display:flex;justify-content:space-between;align-items:center;}
.item-sku{font-size:14px;font-weight:600;font-family:ui-monospace,monospace;}
.item-cs{font-size:13px;color:var(--muted);}
.item-xref{font-size:11px;color:var(--muted);margin-top:1px;}
.item-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;}
.b-ok{background:#052e16;color:var(--accent);}
.b-miss{background:#2d0a0a;color:var(--danger);}
.b-short{background:#2d1a00;color:var(--warn);}
.b-extra{background:#2d1a00;color:var(--warn);}
.item-qty{font-size:13px;color:var(--muted);}

.cnt-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);
}
.cnt-left{flex:1;}
.cnt-sku{font-size:14px;font-weight:600;font-family:ui-monospace,monospace;}
.cnt-cs{font-size:12px;color:var(--muted);}
.cnt-right{display:flex;align-items:center;gap:10px;}
.del-btn{background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer;padding:4px 8px;line-height:1;}

.export-bar{
  padding:12px 16px calc(var(--safe-bottom) + 12px);
  background:var(--surface);border-top:1px solid var(--border);
}
.export-bar button{width:100%;}

.empty{text-align:center;padding:48px 16px;color:var(--muted);font-size:14px;}

.filter-row{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.chip{
  background:var(--surface2);border:1px solid var(--border);border-radius:20px;
  padding:6px 14px;font-size:12px;color:var(--muted);cursor:pointer;white-space:nowrap;
}
.chip.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}

.section-hd{font-size:11px;font-weight:600;color:var(--muted);padding:10px 16px 4px;letter-spacing:0.5px;text-transform:uppercase;}
</style>
</head>
<body>
<div id="app">

<header>
  <h1>Inventory Checker</h1>
  <span>Ord: 9788454</span>
</header>

<div class="stats">
  <div class="stat"><div class="stat-n n-info" id="s-total">45</div><div class="stat-l">expected</div></div>
  <div class="stat"><div class="stat-n n-info" id="s-counted">0</div><div class="stat-l">counted</div></div>
  <div class="stat"><div class="stat-n n-miss" id="s-miss">0</div><div class="stat-l">missing</div></div>
  <div class="stat"><div class="stat-n n-extra" id="s-extra">0</div><div class="stat-l">extra</div></div>
</div>

<nav>
  <button class="active" onclick="showTab('pack')">Packing List</button>
  <button onclick="showTab('count')">Counted</button>
</nav>

<!-- PACKING LIST PANE -->
<div class="pane active" id="pane-pack">
  <div class="filter-row" id="filter-row">
    <div class="chip active" onclick="setFilter('all',this)">All</div>
    <div class="chip" onclick="setFilter('missing',this)">Missing</div>
    <div class="chip" onclick="setFilter('ok',this)">OK</div>
    <div class="chip" onclick="setFilter('short',this)">Short</div>
  </div>
  <div class="list-wrap" id="pl-list"></div>
</div>

<!-- COUNTED PANE -->
<div class="pane" id="pane-count">
  <div class="entry-area">
    <div class="entry-row">
      <input id="i-sku" placeholder="SKU" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />
      <input id="i-cs" placeholder="Color/Size" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />
      <input id="i-qty" type="number" min="1" value="1" class="qty-input" />
    </div>
    <div class="entry-row">
      <button class="btn" style="flex:1" onclick="addCounted()">+ Add Item</button>
      <button class="btn-danger" onclick="clearCounted()">Clear all</button>
    </div>
  </div>
  <div class="list-wrap" id="cnt-list"></div>
</div>

<div class="export-bar">
  <button class="btn" onclick="exportXLSX()">&#8659; Export Reconciliation</button>
</div>

</div>

<script>
const MASTER = [
  {ln:1,loc:"C02-002C01",sku:"MS26EK03S",cs:"PPLISL",xref:"HALES PERFORM",qty:3},
  {ln:2,loc:"A14-044A01",sku:"MS26EK03S",cs:"PPLISM",xref:"HALES PERFORM",qty:1},
  {ln:3,loc:"C02-002B01",sku:"MS26EK21S",cs:"WHT L",xref:"CLARK PERFORM",qty:1},
  {ln:4,loc:"A14-020B02",sku:"MS26EK21S",cs:"WHT M",xref:"CLARK PERFORM",qty:1},
  {ln:5,loc:"A16-038C01",sku:"MS26EK21S",cs:"WHT S",xref:"CLARK PERFORM",qty:1},
  {ln:6,loc:"C01-029B05",sku:"MS26EK21S",cs:"WINB L",xref:"CLARK PERFORM",qty:3},
  {ln:7,loc:"A11-059A03",sku:"MS26EK23S",cs:"W/GG XXL",xref:"PHOENIX PERFO",qty:1},
  {ln:8,loc:"A08-046A02",sku:"MS26EK23S",cs:"WH/BDXL",xref:"PHOENIX PERFO",qty:1},
  {ln:9,loc:"A11-013C03",sku:"MS26EK23S",cs:"WH/BDXXL",xref:"PHOENIX PERFO",qty:1},
  {ln:10,loc:"C02-006A05",sku:"MS26EK45",cs:"BRI XL",xref:"PINE PERFORMA",qty:1},
  {ln:11,loc:"C04-030A06",sku:"MS26EK45",cs:"WINB XL",xref:"PINE PERFORMA",qty:1},
  {ln:12,loc:"A08-054A02",sku:"MS26XK01E",cs:"IRSMTL",xref:"BALLAD PERFOR",qty:1},
  {ln:13,loc:"A08-063C05",sku:"MS26XK01E",cs:"IRSMTM",xref:"BALLAD PERFOR",qty:2},
  {ln:14,loc:"A12-006C04",sku:"MS26XK03E",cs:"SDUNEL",xref:"TREBLE PERFOR",qty:1},
  {ln:15,loc:"A11-011B06",sku:"MS26XK03E",cs:"WHT XL",xref:"TREBLE PERFOR",qty:1},
  {ln:16,loc:"C01-031B02",sku:"MS26XK13E",cs:"NAV M",xref:"EMPIRE PERFOR",qty:2},
  {ln:17,loc:"A11-051A04",sku:"MS26XK13E",cs:"NAV XL",xref:"EMPIRE PERFOR",qty:1},
  {ln:18,loc:"A09-054A03",sku:"MS26XK13E",cs:"STORML",xref:"EMPIRE PERFOR",qty:2},
  {ln:19,loc:"A08-062A05",sku:"MS26XK13E",cs:"STORMM",xref:"EMPIRE PERFOR",qty:1},
  {ln:20,loc:"A13-010C06",sku:"MS26XK13E",cs:"STORMXL",xref:"EMPIRE PERFOR",qty:1},
  {ln:21,loc:"A11-005C05",sku:"MS26XK13E",cs:"WHT XL",xref:"EMPIRE PERFOR",qty:1},
  {ln:22,loc:"C03-028B03",sku:"MS26XK50E",cs:"IRSMTL",xref:"SOUL PERFORMA",qty:1},
  {ln:23,loc:"C02-010C05",sku:"MS26XK50E",cs:"IRSMTM",xref:"SOUL PERFORMA",qty:2},
  {ln:24,loc:"A08-046B01",sku:"MS26XK50E",cs:"LGWILL",xref:"SOUL PERFORMA",qty:1},
  {ln:25,loc:"A11-026B06",sku:"MS26XK50E",cs:"LGWILM",xref:"SOUL PERFORMA",qty:1},
  {ln:26,loc:"A14-052A05",sku:"MS26XK50E",cs:"LGWILS",xref:"SOUL PERFORMA",qty:1},
  {ln:27,loc:"C02-014B02",sku:"MS26XK50E",cs:"LOGSBL",xref:"SOUL PERFORMA",qty:1},
  {ln:28,loc:"A14-039C03",sku:"MS26XK50E",cs:"LOGSBS",xref:"SOUL PERFORMA",qty:1},
  {ln:29,loc:"A15-055C06",sku:"MS26XK55E",cs:"LGWILXXL",xref:"ALBATROSS COT",qty:1},
  {ln:30,loc:"A15-010C04",sku:"MS26XK55E",cs:"SDUNEXL",xref:"ALBATROSS COT",qty:1},
  {ln:31,loc:"C02-032C01",sku:"MS26XK55E",cs:"WHT L",xref:"ALBATROSS COT",qty:2},
  {ln:32,loc:"A14-001C06",sku:"MS26XK60",cs:"LOGSBM",xref:"STEALTH PERFO",qty:2},
  {ln:33,loc:"B18-025G03",sku:"MS26XK60",cs:"STORMS",xref:"STEALTH PERFO",qty:1},
  {ln:34,loc:"C01-011A02",sku:"MS26XK60",cs:"STORMXL",xref:"STEALTH PERFO",qty:1},
  {ln:35,loc:"C01-019A03",sku:"MS26XK63",cs:"DSK M",xref:"ALBATROSS COT",qty:1},
];

const STORAGE_KEY = 'inv_9788454';
let counted = [];
let activeFilter = 'all';
let activeTab = 'pack';

function load() {
  try { const d = localStorage.getItem(STORAGE_KEY); if(d) counted = JSON.parse(d); } catch(e){}
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(counted)); } catch(e){}
}
function key(sku,cs){ return (sku+'|'+cs).toUpperCase().trim(); }
function getCounts(){ const m={}; counted.forEach(r=>{const k=key(r.sku,r.cs);m[k]=(m[k]||0)+r.qty;}); return m; }
function getMasterCounts(){ const m={}; MASTER.forEach(r=>{const k=key(r.sku,r.cs);m[k]=(m[k]||0)+r.qty;}); return m; }

function showTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+tab).classList.add('active');
  document.querySelectorAll('nav button')[tab==='pack'?0:1].classList.add('active');
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderPackList();
}

function itemStatus(r, cmap) {
  const have = cmap[key(r.sku,r.cs)]||0;
  if(have===0) return 'missing';
  if(have>=r.qty) return 'ok';
  return 'short';
}

function renderPackList() {
  const cmap = getCounts();
  const list = document.getElementById('pl-list');
  const filtered = MASTER.filter(r => {
    if(activeFilter==='all') return true;
    return itemStatus(r,cmap)===activeFilter;
  });
  if(!filtered.length){ list.innerHTML='<div class="empty">No items</div>'; return; }
  list.innerHTML = filtered.map(r=>{
    const have = cmap[key(r.sku,r.cs)]||0;
    const st = itemStatus(r,cmap);
    const badgeCls = st==='ok'?'b-ok':st==='missing'?'b-miss':'b-short';
    const badgeTxt = st==='ok'?'OK':st==='missing'?'MISSING':`${have}/${r.qty}`;
    return `<div class="list-item">
      <div class="item-top">
        <div>
          <div class="item-sku">${r.sku}</div>
          <div class="item-cs">${r.cs}</div>
          <div class="item-xref">${r.xref} &middot; Ln ${r.ln}</div>
        </div>
        <div class="item-right">
          <span class="badge ${badgeCls}">${badgeTxt}</span>
          <span class="item-qty">need ${r.qty}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderCounted() {
  const mmap = getMasterCounts();
  const list = document.getElementById('cnt-list');
  if(!counted.length){ list.innerHTML='<div class="empty">Nothing counted yet</div>'; return; }
  list.innerHTML = counted.map((r,i)=>{
    const inMaster = !!mmap[key(r.sku,r.cs)];
    const badge = inMaster ? '<span class="badge b-ok">OK</span>' : '<span class="badge b-extra">EXTRA</span>';
    return `<div class="cnt-item">
      <div class="cnt-left">
        <div class="cnt-sku">${r.sku}</div>
        <div class="cnt-cs">${r.cs} &middot; qty: ${r.qty}</div>
      </div>
      <div class="cnt-right">
        ${badge}
        <button class="del-btn" onclick="removeCounted(${i})">&#x2715;</button>
      </div>
    </div>`;
  }).join('');
}

function updateStats() {
  const cmap = getCounts();
  const mmap = getMasterCounts();
  let totalCounted=0, missing=0, extra=0;
  counted.forEach(r=>totalCounted+=r.qty);
  MASTER.forEach(r=>{ const have=cmap[key(r.sku,r.cs)]||0; if(have<r.qty) missing+=(r.qty-have); });
  counted.forEach(r=>{ if(!mmap[key(r.sku,r.cs)]) extra+=r.qty; });
  document.getElementById('s-counted').textContent=totalCounted;
  document.getElementById('s-miss').textContent=missing;
  document.getElementById('s-extra').textContent=extra;
}

function render() { renderPackList(); renderCounted(); updateStats(); }

function addCounted() {
  const sku = document.getElementById('i-sku').value.trim().toUpperCase();
  const cs = document.getElementById('i-cs').value.trim().toUpperCase();
  const qty = parseInt(document.getElementById('i-qty').value)||1;
  if(!sku) { document.getElementById('i-sku').focus(); return; }
  const k = key(sku,cs);
  const ex = counted.find(r=>key(r.sku,r.cs)===k);
  if(ex){ ex.qty+=qty; } else { counted.push({sku,cs,qty}); }
  save(); render();
  document.getElementById('i-sku').value='';
  document.getElementById('i-cs').value='';
  document.getElementById('i-qty').value='1';
  document.getElementById('i-sku').focus();
}

function removeCounted(i){ counted.splice(i,1); save(); render(); }

function clearCounted(){
  if(confirm('Clear all counted items?')){ counted=[]; save(); render(); }
}

function exportXLSX(){
  const cmap=getCounts(); const mmap=getMasterCounts(); const rows=[];
  MASTER.forEach(r=>{
    const have=cmap[key(r.sku,r.cs)]||0;
    const st=have>=r.qty?'OK':have===0?'MISSING':`SHORT (${have}/${r.qty})`;
    rows.push({Ln:r.ln,Location:r.loc,SKU:r.sku,'Color/Size':r.cs,Xref:r.xref,'Expected':r.qty,'Counted':have,Status:st});
  });
  counted.filter(r=>!mmap[key(r.sku,r.cs)]).forEach(r=>{
    rows.push({Ln:'',Location:'',SKU:r.sku,'Color/Size':r.cs,Xref:'','Expected':0,'Counted':r.qty,Status:'EXTRA'});
  });
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[5,14,12,12,14,9,9,14].map(w=>({wch:w}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Inventory');
  XLSX.writeFile(wb,'inventory_check.xlsx');
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&['i-sku','i-cs','i-qty'].includes(document.activeElement?.id)) addCounted();
});

load(); render();
</script>
</body>
</html>
