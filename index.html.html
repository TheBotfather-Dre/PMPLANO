<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inventory">
<title>Inventory</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;--surface:#161616;--surface2:#212121;--border:#2a2a2a;
  --text:#f0f0f0;--muted:#777;--accent:#4ade80;--warn:#fb923c;
  --danger:#f87171;--info:#60a5fa;--radius:12px;
  --safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;font-size:15px;min-height:100dvh;overflow-x:hidden;}
input,button,textarea,select{font-family:inherit;}

/* SCREENS */
.screen{display:none;flex-direction:column;min-height:100dvh;}
.screen.active{display:flex;}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 14px) 16px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hdr h1{font-size:18px;font-weight:600;letter-spacing:-0.3px;}
.hdr-sub{font-size:12px;color:var(--muted);}
.icon-btn{background:none;border:none;color:var(--info);font-size:14px;font-weight:500;cursor:pointer;padding:4px 0;}

/* HOME SCREEN */
.home-body{flex:1;padding:20px 16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;padding-bottom:calc(var(--safe-bottom)+20px);}
.order-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.order-card:active{background:var(--surface2);}
.oc-left{}
.oc-ord{font-size:15px;font-weight:600;}
.oc-meta{font-size:12px;color:var(--muted);margin-top:3px;}
.oc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.oc-progress{font-size:13px;color:var(--accent);font-weight:600;}
.badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;}
.b-ok{background:#052e16;color:#4ade80;}
.b-miss{background:#2d0a0a;color:#f87171;}
.b-short{background:#2d1a00;color:#fb923c;}
.b-extra{background:#2d1a00;color:#fb923c;}
.b-new{background:#0c2340;color:#60a5fa;}
.big-btn{background:var(--accent);color:#000;border:none;border-radius:var(--radius);padding:16px;font-size:15px;font-weight:700;cursor:pointer;width:100%;text-align:center;}
.ghost-btn{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-size:14px;font-weight:500;cursor:pointer;width:100%;text-align:center;}
.danger-btn{background:none;color:var(--danger);border:1px solid #3a1a1a;border-radius:var(--radius);padding:14px;font-size:14px;cursor:pointer;width:100%;text-align:center;}
.section-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:8px;}

/* NEW ORDER SCREEN */
.form-body{flex:1;padding:16px;overflow-y:auto;padding-bottom:calc(var(--safe-bottom)+80px);}
.field{margin-bottom:14px;}
.field label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px;font-weight:500;}
.field input,.field textarea,.field select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 12px;color:var(--text);font-size:14px;outline:none;}
.field input:focus,.field textarea:focus{border-color:#444;}
.field textarea{resize:none;height:80px;font-family:ui-monospace,monospace;font-size:12px;}
.paste-hint{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5;}
.bottom-bar{position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 16px calc(var(--safe-bottom)+12px);}
.bottom-bar button{width:100%;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* DETAIL SCREEN */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border);}
.stat{background:var(--surface);border-radius:8px;padding:9px 6px;text-align:center;}
.stat-n{font-size:19px;font-weight:700;line-height:1;}
.stat-l{font-size:10px;color:var(--muted);margin-top:2px;}
.n-ok{color:#4ade80;}.n-miss{color:#f87171;}.n-extra{color:#fb923c;}.n-info{color:#60a5fa;}

nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
nav button{flex:1;padding:11px 0;font-size:13px;font-weight:500;background:none;border:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
nav button.active{color:var(--text);border-bottom-color:var(--accent);}

.pane{display:none;flex:1;overflow-y:auto;padding-bottom:80px;}
.pane.active{display:block;}

.filter-row{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);}
.filter-row::-webkit-scrollbar{display:none;}
.chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--muted);cursor:pointer;white-space:nowrap;}
.chip.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}

.list-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.li-left{flex:1;min-width:0;}
.li-sku{font-size:14px;font-weight:600;font-family:ui-monospace,monospace;}
.li-cs{font-size:13px;color:var(--muted);}
.li-xref{font-size:11px;color:var(--muted);margin-top:1px;}
.li-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;margin-left:12px;}
.li-qty{font-size:12px;color:var(--muted);}

/* ENTRY PANE */
.entry-area{padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);}
.entry-row{display:flex;gap:8px;margin-bottom:8px;}
.entry-row:last-child{margin-bottom:0;}
.ei{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;min-width:0;}
.ei:focus{border-color:#444;}
.ei::placeholder{color:var(--muted);}
.ei-sm{width:64px!important;flex:none!important;}
.add-btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;}
.scan-btn{background:var(--info);color:#000;border:none;border-radius:8px;padding:10px 14px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;}

.cnt-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);}
.cnt-left{flex:1;}
.cnt-sku{font-size:14px;font-weight:600;font-family:ui-monospace,monospace;}
.cnt-cs{font-size:12px;color:var(--muted);margin-top:2px;}
.cnt-right{display:flex;align-items:center;gap:10px;}
.del-btn{background:none;border:none;color:var(--danger);font-size:20px;cursor:pointer;padding:4px 8px;line-height:1;}
.empty{text-align:center;padding:48px 16px;color:var(--muted);font-size:14px;}

/* SCANNER OVERLAY */
#scanner-overlay{display:none;position:fixed;inset:0;background:#000;z-index:999;flex-direction:column;}
#scanner-overlay.open{display:flex;}
#scanner-wrap{flex:1;position:relative;overflow:hidden;}
#scanner-wrap video,#scanner-wrap canvas{width:100%;height:100%;object-fit:cover;}
.scan-aim{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);width:260px;height:120px;border:2px solid var(--accent);border-radius:8px;pointer-events:none;}
.scan-aim::before,.scan-aim::after{content:'';position:absolute;width:20px;height:20px;border-color:var(--accent);border-style:solid;}
.scan-aim::before{top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:4px 0 0 0;}
.scan-aim::after{bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 4px 0;}
.scan-status{padding:16px;background:#000;text-align:center;font-size:14px;color:var(--muted);}
.scan-close{padding:14px 16px calc(var(--safe-bottom)+14px);background:#111;border-top:1px solid #222;}
.scan-close button{width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-size:15px;font-weight:600;cursor:pointer;}
#scan-feedback{position:absolute;inset:0;background:rgba(74,222,128,0.15);display:none;pointer-events:none;}

.toast{position:fixed;bottom:calc(var(--safe-bottom)+90px);left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 20px;font-size:13px;color:var(--text);z-index:9999;display:none;white-space:nowrap;}
.toast.show{display:block;}
</style>
</head>
<body>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- SCANNER OVERLAY -->
<div id="scanner-overlay">
  <div id="scanner-wrap">
    <div id="scan-feedback"></div>
    <div class="scan-aim"></div>
  </div>
  <div class="scan-status" id="scan-status">Point camera at barcode</div>
  <div class="scan-close"><button onclick="closeScanner()">Cancel</button></div>
</div>

<!-- SCREEN: HOME -->
<div class="screen active" id="screen-home">
  <div class="hdr">
    <h1>Inventory</h1>
    <button class="icon-btn" onclick="showScreen('screen-new')">+ New Order</button>
  </div>
  <div class="home-body">
    <div class="section-label">Active Orders</div>
    <div id="order-list"><div class="empty">No orders yet. Tap + New Order to start.</div></div>
    <div class="section-label" style="margin-top:8px;">Actions</div>
    <button class="ghost-btn" onclick="showScreen('screen-new')">+ New Order</button>
    <button class="danger-btn" id="clear-all-btn" onclick="clearAllOrders()" style="display:none;">Clear All Orders</button>
  </div>
</div>

<!-- SCREEN: NEW ORDER -->
<div class="screen" id="screen-new">
  <div class="hdr">
    <button class="icon-btn" onclick="showScreen('screen-home')">&#8592; Back</button>
    <h1>New Order</h1>
    <div style="width:60px;"></div>
  </div>
  <div class="form-body">
    <div class="field">
      <label>Order Number</label>
      <input id="new-ord" placeholder="e.g. 9788454" autocomplete="off" />
    </div>
    <div class="field">
      <label>Customer PO</label>
      <input id="new-po" placeholder="e.g. 161768" autocomplete="off" />
    </div>
    <div class="section-label" style="margin-bottom:10px;">Packing List Items</div>
    <div class="field">
      <label>Paste or type items — one per line</label>
      <textarea id="new-paste" placeholder="Format: SKU COLOR/SIZE XREF QTY&#10;Example:&#10;MS26EK03S PPLISL HALES PERFORM 3&#10;MS26EK21S WHT L CLARK PERFORM 1"></textarea>
      <div class="paste-hint">Separate each field with a space. Qty is the last number on the line. Xref can be multiple words.</div>
    </div>
    <div id="new-preview" style="margin-top:4px;"></div>
  </div>
  <div class="bottom-bar">
    <button class="big-btn" onclick="createOrder()">Create Order</button>
  </div>
</div>

<!-- SCREEN: DETAIL -->
<div class="screen" id="screen-detail">
  <div class="hdr">
    <button class="icon-btn" onclick="showScreen('screen-home')">&#8592; Orders</button>
    <div style="text-align:center;">
      <div style="font-size:16px;font-weight:600;" id="det-title">Order</div>
      <div class="hdr-sub" id="det-sub"></div>
    </div>
    <button class="icon-btn" onclick="exportXLSX()">Export</button>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-n n-info" id="s-total">0</div><div class="stat-l">expected</div></div>
    <div class="stat"><div class="stat-n n-info" id="s-counted">0</div><div class="stat-l">counted</div></div>
    <div class="stat"><div class="stat-n n-miss" id="s-miss">0</div><div class="stat-l">missing</div></div>
    <div class="stat"><div class="stat-n n-extra" id="s-extra">0</div><div class="stat-l">extra</div></div>
  </div>
  <nav>
    <button class="active" onclick="showTab('pack')">Packing List</button>
    <button onclick="showTab('count')">Counted</button>
  </nav>

  <div class="pane active" id="pane-pack">
    <div class="filter-row">
      <div class="chip active" onclick="setFilter('all',this)">All</div>
      <div class="chip" onclick="setFilter('missing',this)">Missing</div>
      <div class="chip" onclick="setFilter('ok',this)">OK</div>
      <div class="chip" onclick="setFilter('short',this)">Short</div>
    </div>
    <div id="pl-list"></div>
  </div>

  <div class="pane" id="pane-count">
    <div class="entry-area">
      <div class="entry-row">
        <input class="ei" id="i-sku" placeholder="SKU" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />
        <input class="ei" id="i-cs" placeholder="Color/Size" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />
        <input class="ei ei-sm" id="i-qty" type="number" min="1" value="1" />
      </div>
      <div class="entry-row">
        <button class="scan-btn" onclick="openScanner()">&#9641; Scan</button>
        <button class="add-btn" style="flex:1;" onclick="addCounted()">+ Add</button>
        <button class="del-btn" style="border:1px solid #3a1a1a;border-radius:8px;padding:10px 12px;font-size:13px;" onclick="clearCounted()">Clear</button>
      </div>
    </div>
    <div id="cnt-list"></div>
  </div>

  <div class="bottom-bar">
    <button class="big-btn" onclick="exportXLSX()">&#8659; Export Reconciliation</button>
  </div>
</div>

<script>
const DB = 'inv_app_v1';
let state = { orders: {} };
let currentOrder = null;
let activeFilter = 'all';
let scannerRunning = false;
let scanCooldown = false;

function loadState(){ try{ const d=localStorage.getItem(DB); if(d) state=JSON.parse(d); }catch(e){} }
function saveState(){ try{ localStorage.setItem(DB,JSON.stringify(state)); }catch(e){} }
function key(sku,cs){ return (sku+'|'+cs).toUpperCase().trim(); }

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='screen-home') renderHome();
  if(id==='screen-detail') renderDetail();
  window.scrollTo(0,0);
}

function showToast(msg, dur=2000){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

/* HOME */
function renderHome(){
  const list=document.getElementById('order-list');
  const ids=Object.keys(state.orders);
  document.getElementById('clear-all-btn').style.display=ids.length?'block':'none';
  if(!ids.length){ list.innerHTML='<div class="empty">No orders yet. Tap + New Order to start.</div>'; return; }
  list.innerHTML=ids.map(id=>{
    const o=state.orders[id];
    const cmap=getCounts(o);
    const mmap=getMasterCounts(o);
    const total=o.items.reduce((s,r)=>s+r.qty,0);
    let counted=0; o.counted.forEach(r=>counted+=r.qty);
    let missing=0;
    o.items.forEach(r=>{ const have=cmap[key(r.sku,r.cs)]||0; if(have<r.qty) missing+=(r.qty-have); });
    const pct=total>0?Math.round(counted/total*100):0;
    const st=missing===0&&counted>=total?'b-ok':missing>0?'b-miss':'b-short';
    const stTxt=missing===0&&counted>=total?'Complete':missing>0?`${missing} missing`:'In progress';
    return `<div class="order-card" onclick="openOrder('${id}')">
      <div class="oc-left">
        <div class="oc-ord">Order ${o.ordNum}</div>
        <div class="oc-meta">PO ${o.po} &middot; ${o.items.length} lines &middot; ${total} pcs</div>
      </div>
      <div class="oc-right">
        <span class="badge ${st}">${stTxt}</span>
        <span class="oc-progress">${counted}/${total} counted</span>
      </div>
    </div>`;
  }).join('');
}

function clearAllOrders(){
  if(confirm('Delete ALL orders and counted data?')){ state={orders:{}}; saveState(); renderHome(); }
}

/* NEW ORDER */
function parsePasteLines(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const items=[];
  lines.forEach((line,i)=>{
    const parts=line.split(/\s+/);
    if(parts.length<2) return;
    const qty=parseInt(parts[parts.length-1]);
    const hasQty=!isNaN(qty)&&qty>0;
    const sku=parts[0].toUpperCase();
    let cs='',xref='',q=1;
    if(hasQty){
      q=qty;
      if(parts.length>=3){
        cs=parts[1].toUpperCase();
        xref=parts.slice(2,parts.length-1).join(' ').toUpperCase();
      } else { cs=''; xref=''; }
    } else {
      cs=parts[1]?parts[1].toUpperCase():'';
      xref=parts.slice(2).join(' ').toUpperCase();
    }
    items.push({ln:i+1,loc:'',sku,cs,xref,qty:q});
  });
  return items;
}

document.getElementById('new-paste').addEventListener('input',function(){
  const items=parsePasteLines(this.value);
  const prev=document.getElementById('new-preview');
  if(!items.length){prev.innerHTML='';return;}
  const total=items.reduce((s,r)=>s+r.qty,0);
  prev.innerHTML=`<div style="font-size:12px;color:var(--accent);margin-bottom:8px;">&#10003; ${items.length} lines parsed &middot; ${total} total pieces</div>`;
});

function createOrder(){
  const ordNum=document.getElementById('new-ord').value.trim()||'Unknown';
  const po=document.getElementById('new-po').value.trim()||'—';
  const pasteVal=document.getElementById('new-paste').value.trim();
  const items=parsePasteLines(pasteVal);
  if(!items.length){ showToast('Add at least one item'); return; }
  const id='ord_'+Date.now();
  state.orders[id]={id,ordNum,po,items,counted:[]};
  saveState();
  document.getElementById('new-ord').value='';
  document.getElementById('new-po').value='';
  document.getElementById('new-paste').value='';
  document.getElementById('new-preview').innerHTML='';
  openOrder(id);
}

/* DETAIL */
function openOrder(id){
  currentOrder=id;
  const o=state.orders[id];
  document.getElementById('det-title').textContent='Order '+o.ordNum;
  document.getElementById('det-sub').textContent='PO '+o.po;
  showScreen('screen-detail');
  showTab('pack');
}

function getCounts(o){ const m={}; (o.counted||[]).forEach(r=>{const k=key(r.sku,r.cs);m[k]=(m[k]||0)+r.qty;}); return m; }
function getMasterCounts(o){ const m={}; (o.items||[]).forEach(r=>{const k=key(r.sku,r.cs);m[k]=(m[k]||0)+r.qty;}); return m; }

function itemStatus(r,cmap){
  const have=cmap[key(r.sku,r.cs)]||0;
  if(have===0) return 'missing';
  if(have>=r.qty) return 'ok';
  return 'short';
}

function showTab(tab){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+tab).classList.add('active');
  document.querySelectorAll('nav button')[tab==='pack'?0:1].classList.add('active');
}

function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderPackList();
}

function renderPackList(){
  if(!currentOrder) return;
  const o=state.orders[currentOrder];
  const cmap=getCounts(o);
  const list=document.getElementById('pl-list');
  const filtered=o.items.filter(r=>activeFilter==='all'||itemStatus(r,cmap)===activeFilter);
  if(!filtered.length){list.innerHTML='<div class="empty">No items</div>';return;}
  list.innerHTML=filtered.map(r=>{
    const have=cmap[key(r.sku,r.cs)]||0;
    const st=itemStatus(r,cmap);
    const bc=st==='ok'?'b-ok':st==='missing'?'b-miss':'b-short';
    const bt=st==='ok'?'OK':st==='missing'?'MISSING':`${have}/${r.qty}`;
    return `<div class="list-item">
      <div class="li-left">
        <div class="li-sku">${r.sku}</div>
        <div class="li-cs">${r.cs}</div>
        ${r.xref?`<div class="li-xref">${r.xref}${r.ln?' &middot; Ln '+r.ln:''}</div>`:''}
      </div>
      <div class="li-right">
        <span class="badge ${bc}">${bt}</span>
        <span class="li-qty">need ${r.qty}</span>
      </div>
    </div>`;
  }).join('');
}

function renderCounted(){
  if(!currentOrder) return;
  const o=state.orders[currentOrder];
  const mmap=getMasterCounts(o);
  const list=document.getElementById('cnt-list');
  if(!o.counted.length){list.innerHTML='<div class="empty">Nothing counted yet</div>';return;}
  list.innerHTML=o.counted.map((r,i)=>{
    const inM=!!mmap[key(r.sku,r.cs)];
    return `<div class="cnt-item">
      <div class="cnt-left">
        <div class="cnt-sku">${r.sku}</div>
        <div class="cnt-cs">${r.cs?r.cs:'—'} &middot; qty: ${r.qty}</div>
      </div>
      <div class="cnt-right">
        <span class="badge ${inM?'b-ok':'b-extra'}">${inM?'OK':'EXTRA'}</span>
        <button class="del-btn" onclick="removeCounted(${i})">&#x2715;</button>
      </div>
    </div>`;
  }).join('');
}

function updateStats(){
  if(!currentOrder) return;
  const o=state.orders[currentOrder];
  const cmap=getCounts(o);
  const mmap=getMasterCounts(o);
  let totalExp=o.items.reduce((s,r)=>s+r.qty,0);
  let totalCnt=0; o.counted.forEach(r=>totalCnt+=r.qty);
  let missing=0; o.items.forEach(r=>{const have=cmap[key(r.sku,r.cs)]||0;if(have<r.qty)missing+=(r.qty-have);});
  let extra=0; o.counted.forEach(r=>{if(!mmap[key(r.sku,r.cs)])extra+=r.qty;});
  document.getElementById('s-total').textContent=totalExp;
  document.getElementById('s-counted').textContent=totalCnt;
  document.getElementById('s-miss').textContent=missing;
  document.getElementById('s-extra').textContent=extra;
}

function renderDetail(){ renderPackList(); renderCounted(); updateStats(); }

function addCounted(skuOverride,csOverride){
  if(!currentOrder) return;
  const sku=(skuOverride||document.getElementById('i-sku').value.trim()).toUpperCase();
  const cs=(csOverride||document.getElementById('i-cs').value.trim()).toUpperCase();
  const qty=parseInt(document.getElementById('i-qty').value)||1;
  if(!sku) return;
  const o=state.orders[currentOrder];
  const k=key(sku,cs);
  const ex=o.counted.find(r=>key(r.sku,r.cs)===k);
  if(ex){ex.qty+=qty;}else{o.counted.push({sku,cs,qty});}
  saveState(); renderDetail();
  if(!skuOverride){
    document.getElementById('i-sku').value='';
    document.getElementById('i-cs').value='';
    document.getElementById('i-qty').value='1';
    document.getElementById('i-sku').focus();
  }
}

function removeCounted(i){
  if(!currentOrder) return;
  state.orders[currentOrder].counted.splice(i,1);
  saveState(); renderDetail();
}

function clearCounted(){
  if(!currentOrder) return;
  if(confirm('Clear all counted items for this order?')){
    state.orders[currentOrder].counted=[];
    saveState(); renderDetail();
  }
}

/* SCANNER */
function openScanner(){
  const overlay=document.getElementById('scanner-overlay');
  overlay.classList.add('open');
  document.getElementById('scan-status').textContent='Starting camera...';
  scannerRunning=true; scanCooldown=false;
  Quagga.init({
    inputStream:{type:'LiveStream',target:document.getElementById('scanner-wrap'),constraints:{facingMode:'environment',width:{min:640},height:{min:480}}},
    locator:{patchSize:'medium',halfSample:true},
    numOfWorkers:2,
    decoder:{readers:['code_128_reader','ean_reader','ean_8_reader','code_39_reader','upc_reader','upc_e_reader']},
    locate:true
  },function(err){
    if(err){document.getElementById('scan-status').textContent='Camera error: '+err.message;return;}
    Quagga.start();
    document.getElementById('scan-status').textContent='Point camera at barcode';
  });
  Quagga.onDetected(function(result){
    if(!scanCooldown && result.codeResult && result.codeResult.code){
      scanCooldown=true;
      const code=result.codeResult.code;
      const fb=document.getElementById('scan-feedback');
      fb.style.display='block';
      setTimeout(()=>fb.style.display='none',300);
      document.getElementById('scan-status').textContent='Scanned: '+code;
      document.getElementById('i-sku').value=code;
      document.getElementById('i-cs').value='';
      document.getElementById('i-qty').value='1';
      closeScanner();
      showTab('count');
      showToast('Scanned: '+code);
      setTimeout(()=>{document.getElementById('i-cs').focus();},400);
      setTimeout(()=>scanCooldown=false,2000);
    }
  });
}

function closeScanner(){
  if(scannerRunning){
    try{Quagga.stop();}catch(e){}
    scannerRunning=false;
  }
  document.getElementById('scanner-overlay').classList.remove('open');
}

/* EXPORT */
function exportXLSX(){
  if(!currentOrder) return;
  const o=state.orders[currentOrder];
  const cmap=getCounts(o); const mmap=getMasterCounts(o); const rows=[];
  o.items.forEach(r=>{
    const have=cmap[key(r.sku,r.cs)]||0;
    const st=have>=r.qty?'OK':have===0?'MISSING':`SHORT (${have}/${r.qty})`;
    rows.push({Ln:r.ln,Location:r.loc,SKU:r.sku,'Color/Size':r.cs,Xref:r.xref,'Expected':r.qty,'Counted':have,Status:st});
  });
  o.counted.filter(r=>!mmap[key(r.sku,r.cs)]).forEach(r=>{
    rows.push({Ln:'',Location:'',SKU:r.sku,'Color/Size':r.cs,Xref:'','Expected':0,'Counted':r.qty,Status:'EXTRA'});
  });
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[5,12,13,12,14,9,9,14].map(w=>({wch:w}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Inventory');
  XLSX.writeFile(wb,'inventory_'+o.ordNum+'.xlsx');
}

/* KEYBOARD */
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&['i-sku','i-cs','i-qty'].includes(document.activeElement?.id)) addCounted();
});

loadState();
renderHome();
</script>
